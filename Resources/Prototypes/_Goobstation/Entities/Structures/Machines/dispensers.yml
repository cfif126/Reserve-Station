      OilOlive: 20  # Reserve edit: Orchid's Barmania - Service Heaven
      Enzyme: 40  # Reserve edit: Orchid's Barmania - Service Heaven
      Butter: 32  # Reserve edit: Orchid's Barmania - Service Heaven
