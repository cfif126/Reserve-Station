# Objects

- type: entity
  id: GeneratorBasic15kWChance
  name: generator spawner
  suffix: 15kW, 50% chance to spawn
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: red
      - sprite: Structures/Power/power.rsi
        state: generator
  - type: RandomSpawner
    prototypes:
      - GeneratorBasic15kW
    chance: 0.5

- type: entity
  id: SolarPanelChance
  name: solar panel spawner
  suffix: 10% to be broken
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: red
      - sprite: Structures/Power/Generation/solar_panel.rsi
        state: solar_panel_glass
  - type: RandomSpawner
    prototypes:
      - SolarPanel
    chance: 1
    rarePrototypes:
      - SolarPanelBroken
    rareChance: 0.15

- type: entity
  id: RandomCanister
  name: random gas canister spawner
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: red
      - sprite: Structures/Storage/canister.rsi
        state: blue
  - type: RandomSpawner
    prototypes:
      - AirCanister
      - CarbonDioxideCanister
      - NitrogenCanister
      - OxygenCanister
      - PlasmaCanister
      - WaterVaporCanister
    chance: 1
    rarePrototypes:
      - AmmoniaCanister
      - FrezonCanister
      - NitrousOxideCanister
      - TritiumCanister
      - BZCanister
      - HealiumCanister
      - NitriumCanister
      - PluoxiumCanister
    rareChance: 0.25
    offset: 0.0

