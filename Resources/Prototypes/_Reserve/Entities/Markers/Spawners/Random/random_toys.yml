- type: entity
  id: RandomPersonalAI
  name: random personal AI spawner
  suffix: Normal
  parent: MarkerBase
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    layers:
      - state: green
      - sprite: Objects/Fun/pai.rsi
        state: pai-base
  - type: RandomSpawner
    prototypes:
      - PersonalAI
    chance: 0.75
    offset: 0.0
    rarePrototypes:
      - GoldenPersonalAI
    rareChance: 0.02

