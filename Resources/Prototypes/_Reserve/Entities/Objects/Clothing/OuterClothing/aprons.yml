- type: entity
  parent: [ClothingOuterApronBotanist, BaseCivilianContraband]
  id: ClothingOuterApronBotanistAdvanced
  name: advanced botanical apron
  description: A thick apron, perfect for insulating your soft flesh from spills, soil and thorns.
  suffix: ""
  components:
  - type: Sprite
    sprite: &botanical_apron_sprite _Reserve/Clothing/OuterClothing/Aprons/botanical.rsi
  - type: Clothing
    sprite: *botanical_apron_sprite
  - type: Storage
    grid:
    - 0,0,3,1  # 8 slots instead of default 6
  - type: Armor
    modifiers:
      coefficients:
        Piercing: 0.90
        Slash: 0.85
        Caustic: 0.90

- type: entity
  parent: [ClothingOuterApronBotanist, BaseMedicalScienceContraband]
  id: ClothingOuterApronChemist
  name: advanced chemical apron
  description: A protective apron designed for protecting from chemical spills.
  suffix: ""
  components:
  - type: Sprite
    sprite: &chemist_apron_sprite _Reserve/Clothing/OuterClothing/Aprons/chemical.rsi
  - type: Clothing
    sprite: *chemist_apron_sprite
  - type: Storage
    grid:
    - 0,0,3,1  # 8 slots instead of default 6
  - type: Armor
    modifiers:
      coefficients:
        Caustic: 0.70
