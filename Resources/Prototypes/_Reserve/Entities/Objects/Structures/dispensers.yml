- type: entity
  parent: SodaDispenserEmpty
  id: SauceDispenserEmpty
  name: раздатчик соусов
  description: Диспенсер для соусов и приправ.
  suffix: Empty
  components:
  - type: Sprite
    state: sauce
  - type: Machine
    board: SauceDispenserMachineCircuitboard
  - type: GuideHelp
    guides:
    - Chef
    - FoodRecipes

- type: entity
  parent: SauceDispenserEmpty
  id: SauceDispenser
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: FoodCondimentBottleKetchup
    - id: FoodCondimentBottleBBQ
    - id: FoodCondimentBottleHotsauce
    - id: FoodCondimentBottleMayo
    - id: FoodCondimentBottleMustard
    - id: FoodCondimentBottleSoySauce

- type: entity
  parent: CleanerDispenser
  id: LaughterDispenser
  name: laughter dispenser
  description: A wallmount dispenser capable of dispensing laughter. Refill your mood here.
  components:
  - type: Sprite
    sprite: Structures/Storage/tanks.rsi
    state: laughterdispenser
  - type: SolutionContainerManager
    solutions:
      tank:
        reagents:
        - ReagentId: Laughter
          Quantity: 1000
  - type: ReagentTank

- type: entity
  parent: EnergyChemDispenser
  id: EnergyDrinkDispenser
  name: energy drink dispenser
  suffix: energy
  description: A bluespace Drink Dispenser that uses station energy to synthesize basic non-alcoholic still drinks. The future is here and now.
  components:
  - type: Sprite
    sprite: _Reserve/Objects/Structures/dispensers.rsi
    state: drinks
  - type: Battery
    maxCharge: 1200
    startingCharge: 1200
  - type: GuideHelp
    guides:
