- type: entity
  id: SauceDispenserMachineCircuitboard
  parent: BaseMachineCircuitboard
  name: sauce dispenser machine board
  description: A machine printed circuit board for a sauce dispenser.
  components:
    - type: Sprite
      state: service
    - type: MachineBoard
      prototype: SauceDispenserEmpty
      stackRequirements:
        Steel: 5
      tagRequirements:
          GlassBeaker:
            amount: 1
            defaultPrototype: Beaker

